<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>软萌垂耳小兔・职场黑话词典</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(145deg, #FFF5F8 0%, #FFE8D6 100%);
            font-family: 'Segoe UI', 'Quicksand', system-ui, -apple-system, 'Nunito', 'Poppins', 'Comic Neue', sans-serif;
            padding: 1.5rem 1rem 3rem;
            min-height: 100vh;
        }

        /* 主容器 */
        .container {
            max-width: 650px;
            margin: 0 auto;
        }

        /* ========= 顶部Banner ========= */
        .banner {
            background: #FFF5F8;
            border-radius: 48px;
            padding: 1.5rem 1.8rem;
            margin-bottom: 2rem;
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.05);
            position: relative;
            overflow: hidden;
            border: 2px solid #FFC0CB;
            backdrop-filter: blur(2px);
        }

        .bunny-wrapper {
            display: flex;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        .bunny-icon {
            font-size: 4.5rem;
            filter: drop-shadow(2px 6px 12px rgba(255, 160, 180, 0.3));
            transition: transform 0.2s ease;
        }

        .bunny-icon:hover {
            transform: scale(1.02);
        }

        .title-section {
            flex: 1;
        }

        .title-section h1 {
            font-size: 1.9rem;
            font-weight: 800;
            background: linear-gradient(135deg, #FF9AAE, #FFB347);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.3px;
            margin-bottom: 6px;
        }

        .title-section p {
            color: #B4846C;
            font-weight: 500;
            font-size: 0.9rem;
        }

        .cloud-deco {
            position: absolute;
            bottom: -15px;
            right: -10px;
            opacity: 0.2;
            font-size: 5rem;
            pointer-events: none;
        }

        /* 通用卡片 */
        .card {
            background: #FFFFFFEE;
            backdrop-filter: blur(4px);
            border-radius: 48px;
            padding: 1.6rem 1.8rem;
            margin-bottom: 2rem;
            box-shadow: 0 20px 30px -12px rgba(0, 0, 0, 0.08), 0 1px 3px rgba(0,0,0,0.02);
            border: 1px solid #FFD9E0;
            transition: all 0.2s;
        }

        /* 兔子耳朵小装饰 */
        .card {
            position: relative;
        }

        .card::before {
            content: "🐇";
            position: absolute;
            top: -16px;
            left: 28px;
            font-size: 2rem;
            opacity: 0.7;
            filter: drop-shadow(0 4px 4px rgba(0,0,0,0.05));
            pointer-events: none;
        }

        /* 输入区 */
        .input-group {
            margin-bottom: 1.4rem;
        }

        .input-group label {
            display: flex;
            align-items: center;
            gap: 6px;
            font-weight: 600;
            color: #BA7A5A;
            margin-bottom: 8px;
            font-size: 0.95rem;
        }

        input, textarea {
            width: 100%;
            border: 2px solid #FFE2E8;
            background: #FFFFFF;
            border-radius: 60px;
            padding: 14px 20px;
            font-size: 1rem;
            font-family: inherit;
            transition: 0.2s;
            outline: none;
            color: #3A2C2A;
            resize: vertical;
        }

        textarea {
            border-radius: 32px;
            resize: vertical;
        }

        input:focus, textarea:focus {
            border-color: #FFB7C5;
            box-shadow: 0 0 0 3px rgba(255, 192, 203, 0.4);
        }

        /* 兔子造型按钮 */
        .btn-bunny {
            background: #FFC0CB;
            border: none;
            border-radius: 100px;
            padding: 12px 24px;
            font-weight: 700;
            font-size: 1rem;
            color: #8B5A4A;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            width: 100%;
            box-shadow: 0 6px 0 #E2A3B2;
            transform: translateY(-2px);
        }

        .btn-bunny:hover {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #E2A3B2;
            background: #FFB3C1;
        }

        .btn-bunny:active {
            transform: translateY(4px);
            box-shadow: 0 0px 0 #E2A3B2;
        }

        /* 查询按钮内部动画 hover 眨眼 */
        .btn-bunny span:first-child {
            font-size: 1.4rem;
            transition: transform 0.15s;
        }

        .btn-bunny:hover span:first-child {
            transform: scaleX(0.9) scaleY(0.7);
            display: inline-block;
        }

        /* 结果卡片 */
        .result-card {
            background: #FFFBF5;
            border-radius: 44px;
            padding: 1.5rem;
            margin-top: 1.2rem;
            border-left: 12px solid #FFC0CB;
            box-shadow: 0 8px 18px rgba(0, 0, 0, 0.05);
        }

        .bunny-emoji {
            font-size: 2.4rem;
            display: inline-block;
            margin-right: 8px;
            vertical-align: middle;
        }

        .result-text {
            font-size: 1.08rem;
            line-height: 1.45;
            color: #3D2B27;
            margin-top: 8px;
            font-weight: 500;
        }

        .footprint {
            margin-top: 12px;
            font-size: 1rem;
            color: #EEB5C0;
            letter-spacing: 4px;
        }

        /* 底部提交区 */
        .submit-area {
            background: #FFFAF0;
        }

        .toast-msg {
            margin-top: 16px;
            border-radius: 60px;
            padding: 10px;
            text-align: center;
            font-size: 0.85rem;
            background: #FFE3E9;
            color: #BC6F5C;
            display: none;
        }

        .footer {
            text-align: center;
            margin-top: 2rem;
            font-size: 0.7rem;
            color: #CEAFA0;
        }

        /* 响应式 */
        @media (max-width: 550px) {
            .container {
                padding: 0;
            }
            .card {
                padding: 1.4rem;
            }
            .title-section h1 {
                font-size: 1.6rem;
            }
            .bunny-icon {
                font-size: 3.5rem;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <!-- 顶部IP区域 -->
    <div class="banner">
        <div class="bunny-wrapper">
            <div class="bunny-icon">🐰🌸</div>
            <div class="title-section">
                <h1>垂耳小兔・职场黑话词典</h1>
                <p>🐇 软软翻译官 · 陪你听懂职场话</p>
            </div>
        </div>
        <div class="cloud-deco">☁️☁️</div>
    </div>

    <!-- 查询区 -->
    <div class="card">
        <div class="input-group">
            <label>🔎 输入黑话 <span style="font-size:0.7rem;">(例如 赋能/闭环)</span></label>
            <input type="text" id="queryInput" placeholder="输入你想查的职场黑话～ 比如：对齐颗粒度" autocomplete="off">
        </div>
        <button class="btn-bunny" id="queryBtn">
            <span>🐰✨</span> 兔子翻译官
        </button>
        <div id="resultArea" style="display: none;" class="result-card">
            <div><span class="bunny-emoji">🐇</span> <strong>小兔说：</strong></div>
            <div id="resultText" class="result-text"></div>
            <div class="footprint">🐾 🐾 🐾</div>
        </div>
    </div>

    <!-- 提交新词区 -->
    <div class="card submit-area">
        <div class="input-group">
            <label>📝 新黑话名称</label>
            <input type="text" id="newSlang" placeholder="例如：降本增笑" autocomplete="off">
        </div>
        <div class="input-group">
            <label>💬 大白话解释</label>
            <textarea id="newDefinition" rows="2" placeholder="请用一句人话解释它的意思～"></textarea>
        </div>
        <div class="input-group">
            <label>🐣 你的昵称（选填）</label>
            <input type="text" id="submitter" placeholder="热心兔崽" autocomplete="off">
        </div>
        <button class="btn-bunny" id="submitBtn">
            <span>🍃✏️</span> 投喂小黑话
        </button>
        <div id="submitMsg" class="toast-msg"></div>
    </div>
    <div class="footer">
        💖 新词会先进「小兔待审核区」，人工审核后就加入词典啦 💖
    </div>
</div>

<script>
    // ===================== 请替换为你的实际凭证 =====================
    const QUERY_WORKFLOW_ID = "7638267826549932047";   // 查询工作流ID (数字)
    const SUBMIT_WORKFLOW_ID = "7638245914289029156"; // 提交工作流ID (数字)
    const PAT = "pat_UaGaQmVZaIVdwlEybwAcjW2WVheYgLbE4v63e6IEYIQHTf6H5uiEsWSGB7xnRGyH";                               // 个人访问令牌
    // ===============================================================

    const API_URL = "https://api.coze.cn/v1/workflow/run";

    // 通用请求函数
    async function callCozeWorkflow(workflowId, parameters) {
        const response = await fetch(API_URL, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${PAT}`
            },
            body: JSON.stringify({
                workflow_id: workflowId,
                parameters: parameters
            })
        });
        const result = await response.json();
        if (!response.ok || result.code !== 0) {
            throw new Error(result.msg || `请求失败 code=${result.code}`);
        }
        return result.data; // 工作流返回内容通常放在 data 字段
    }

    // ---------- 查询功能 ----------
    const queryBtn = document.getElementById('queryBtn');
    const queryInput = document.getElementById('queryInput');
    const resultArea = document.getElementById('resultArea');
    const resultText = document.getElementById('resultText');

    queryBtn.addEventListener('click', async () => {
        const slang = queryInput.value.trim();
        if (!slang) {
            alert('🐇 小兔提醒：输入一个黑话词再查询叭～');
            return;
        }

        // 显示加载状态
        resultArea.style.display = 'block';
        resultText.innerHTML = '<span class="bunny-emoji">⏳</span> 小兔正在翻词典...';

        try {
            const data = await callCozeWorkflow(QUERY_WORKFLOW_ID, { slang: slang，definition: definition });
            // 根据你实际工作流返回结构，通常 definition 在 data.output 或 data.result
            const definition = data.outputList || data.result || '暂时没找到这个词的解释，欢迎提交新词～';
            resultText.innerHTML = `“${slang}”  ${definition}`;
        } catch (err) {
            console.error(err);
            resultText.innerHTML = `❄️ 查询失败：${err.message || '小兔网络迷路了，稍后再试～'}`;
        }
    });

    // ---------- 提交功能 ----------
    const submitBtn = document.getElementById('submitBtn');
    const newSlang = document.getElementById('newSlang');
    const newDefinition = document.getElementById('newDefinition');
    const submitterField = document.getElementById('submitter');
    const submitMsg = document.getElementById('submitMsg');

    function showSubmitMessage(msg, isError = false) {
        submitMsg.style.display = 'block';
        submitMsg.textContent = msg;
        submitMsg.style.backgroundColor = isError ? '#FFE1E1' : '#E6FFEC';
        submitMsg.style.color = isError ? '#B84C4C' : '#2F7D4F';
        setTimeout(() => {
            submitMsg.style.display = 'none';
        }, 4500);
    }

    submitBtn.addEventListener('click', async () => {
        const slang = newSlang.value.trim();
        const definition = newDefinition.value.trim();
        const submitter = submitterField.value.trim() || '热心小兔';

        if (!slang || slang.length < 1) {
            showSubmitMessage('🐇 请填写黑话名称', true);
            return;
        }
        if (!definition || definition.length < 2) {
            showSubmitMessage('📖 请给黑话写一句大白话解释～', true);
            return;
        }

        submitBtn.disabled = true;
        submitBtn.style.opacity = '0.7';
        const originalText = submitBtn.innerHTML;
        submitBtn.innerHTML = '<span>✨</span> 投喂中...';

        try {
            await callCozeWorkflow(SUBMIT_WORKFLOW_ID, {
                slang: slang,
                definition: definition,
                submitter: submitter
            });
            showSubmitMessage('✅ 投喂成功！小兔收到，审核通过后会展示在词典里～', false);
            newSlang.value = '';
            newDefinition.value = '';
            submitterField.value = '';
        } catch (err) {
            console.error(err);
            showSubmitMessage(`❌ 提交失败：${err.message || '请稍后再试'}`, true);
        } finally {
            submitBtn.disabled = false;
            submitBtn.style.opacity = '1';
            submitBtn.innerHTML = originalText;
        }
    });
</script>
</body>
</html>
