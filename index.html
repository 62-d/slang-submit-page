<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>职场黑话翻译器 · 查询 + 提交</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(145deg, #1e293b, #0f172a);
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
        }
        .card {
            max-width: 750px;
            width: 100%;
            background: #ffffff;
            border-radius: 2rem;
            box-shadow: 0 25px 45px -12px rgba(0,0,0,0.4);
            overflow: hidden;
        }
        .card-header {
            background: #4f46e5;
            padding: 1.5rem 2rem;
            color: white;
        }
        .card-header h1 {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }
        .card-header p {
            opacity: 0.85;
            font-size: 0.95rem;
        }
        .section {
            padding: 1.5rem 2rem;
            border-bottom: 1px solid #eef2ff;
        }
        .section:last-child {
            border-bottom: none;
        }
        .section h2 {
            font-size: 1.3rem;
            margin-bottom: 1rem;
            color: #0f172a;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .form-group {
            margin-bottom: 1rem;
        }
        label {
            font-weight: 600;
            display: block;
            margin-bottom: 0.5rem;
            color: #1e293b;
        }
        input, textarea {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 1px solid #e2e8f0;
            border-radius: 1rem;
            font-size: 1rem;
            transition: 0.2s;
            font-family: inherit;
        }
        input:focus, textarea:focus {
            outline: none;
            border-color: #4f46e5;
            box-shadow: 0 0 0 3px rgba(79,70,229,0.2);
        }
        button {
            background: #4f46e5;
            color: white;
            font-weight: 600;
            padding: 0.7rem 1.5rem;
            border: none;
            border-radius: 2rem;
            cursor: pointer;
            margin-top: 0.5rem;
            transition: 0.2s;
        }
        button.secondary {
            background: #64748b;
        }
        button:hover {
            transform: scale(0.98);
            background: #4338ca;
        }
        .result-box {
            background: #f1f5f9;
            border-radius: 1rem;
            padding: 1rem;
            margin-top: 1rem;
            font-size: 0.95rem;
            white-space: pre-wrap;
        }
        .toast {
            margin-top: 1rem;
            border-radius: 1rem;
            padding: 0.75rem;
            text-align: center;
            font-size: 0.85rem;
            display: none;
        }
        hr {
            margin: 0 2rem;
            border-color: #eef2ff;
        }
    </style>
</head>
<body>
<div class="card">
    <div class="card-header">
        <h1>🧠 职场黑话翻译器</h1>
        <p>查询已有黑话 · 提交新词共建词库</p>
    </div>

    <!-- 查询区域 -->
    <div class="section">
        <h2>🔍 查询黑话</h2>
        <div class="form-group">
            <input type="text" id="queryInput" placeholder="例如：赋能、闭环、降本增效" autocomplete="off">
        </div>
        <button id="queryBtn">查询</button>
        <div id="queryResult" class="result-box" style="display: none;"></div>
    </div>

    <hr>

    <!-- 提交区域 -->
    <div class="section">
        <h2>✍️ 提交新词</h2>
        <form id="submitForm">
            <div class="form-group">
                <input type="text" name="slang" placeholder="黑话 *" required>
            </div>
            <div class="form-group">
                <textarea name="definition" rows="2" placeholder="大白话解释 *" required></textarea>
            </div>
            <div class="form-group">
                <input type="text" name="submitter" placeholder="你的昵称（选填）">
            </div>
            <button type="submit">提交</button>
            <div id="submitMsg" class="toast"></div>
        </form>
    </div>
</div>

<script>
    // ==================  请替换为你的真实值  ==================
    const SUBMIT_WORKFLOW_ID = "7638245914289029156";   // 已有的增加工作流ID
    const QUERY_WORKFLOW_ID = "7638267826549932047"; // 新建的查询工作流ID，比如 "7639000000000000000"
    const PAT = "pat_UaGaQmVZaIVdwlEybwAcjW2WVheYgLbE4v63e6IEYIQHTf6H5uiEsWSGB7xnRGyH";                         // 你的个人令牌，比如 "pat_abc123def456"
    // =====================================================

    // 通用调用 Coze 工作流函数
    async function callWorkflow(workflowId, params) {
        const response = await fetch('https://api.coze.cn/v1/workflow/run', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${PAT}`
            },
            body: JSON.stringify({
                workflow_id: workflowId,
                parameters: params
            })
        });
        const result = await response.json();
        if (!response.ok || result.code !== 0) {
            throw new Error(result.msg || `请求失败 code=${result.code}`);
        }
        // 工作流返回的数据一般在 result.data 中，根据你的实际结构调整
        return result.data;
    }

    // ----- 查询功能 -----
    const queryBtn = document.getElementById('queryBtn');
    const queryInput = document.getElementById('queryInput');
    const queryResultDiv = document.getElementById('queryResult');

    queryBtn.addEventListener('click', async () => {
        const slang = queryInput.value.trim();
        if (!slang) {
            alert('请输入黑话');
            return;
        }
        queryResultDiv.style.display = 'block';
        queryResultDiv.textContent = '查询中...';
        try {
            const data = await callWorkflow(QUERY_WORKFLOW_ID, { slang });
            // 假设工作流返回的文本在 data.output 或 data.result 字段
            const translation = data.output || data.result || '未找到匹配结果';
            queryResultDiv.textContent = `📖 翻译：${translation}`;
        } catch (err) {
            queryResultDiv.textContent = `❌ 查询失败：${err.message}`;
        }
    });

    // ----- 提交功能 -----
    const submitForm = document.getElementById('submitForm');
    const submitMsg = document.getElementById('submitMsg');
    submitForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const slang = submitForm.slang.value.trim();
        const definition = submitForm.definition.value.trim();
        const submitter = submitForm.submitter.value.trim() || '热心网友';
        if (!slang || slang.length < 2) {
            submitMsg.style.display = 'block';
            submitMsg.textContent = '请填写黑话（至少2字）';
            submitMsg.style.backgroundColor = '#fee2e2';
            setTimeout(() => submitMsg.style.display = 'none', 3000);
            return;
        }
        if (!definition || definition.length < 4) {
            submitMsg.style.display = 'block';
            submitMsg.textContent = '请填写大白话解释（至少4字）';
            submitMsg.style.backgroundColor = '#fee2e2';
            setTimeout(() => submitMsg.style.display = 'none', 3000);
            return;
        }
        const btn = submitForm.querySelector('button');
        btn.disabled = true;
        btn.textContent = '提交中...';
        try {
            await callWorkflow(SUBMIT_WORKFLOW_ID, { slang, definition, submitter });
            submitMsg.style.display = 'block';
            submitMsg.textContent = '✅ 提交成功，感谢贡献！';
            submitMsg.style.backgroundColor = '#dbeafe';
            submitForm.reset();
            setTimeout(() => submitMsg.style.display = 'none', 3000);
        } catch (err) {
            submitMsg.style.display = 'block';
            submitMsg.textContent = `❌ 提交失败：${err.message}`;
            submitMsg.style.backgroundColor = '#fee2e2';
            setTimeout(() => submitMsg.style.display = 'none', 3000);
        } finally {
            btn.disabled = false;
            btn.textContent = '提交';
        }
    });
</script>
</body>
</html>
