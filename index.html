<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>职场黑话翻译器 · 补充新词</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{background:linear-gradient(145deg,#1e293b,#0f172a);font-family:system-ui,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem 1rem;}
        .card{max-width:650px;width:100%;background:#fff;border-radius:2rem;box-shadow:0 25px 45px -12px #0006;overflow:hidden;}
        .card-header{background:#4f46e5;padding:1.5rem 2rem;color:#fff;}
        .card-header h1{font-size:1.8rem;font-weight:700;display:flex;align-items:center;gap:0.75rem;}
        .card-header p{opacity:0.85;margin-top:0.5rem;font-size:0.95rem;}
        .card-body{padding:2rem;}
        .form-group{margin-bottom:1.5rem;}
        label{font-weight:600;display:block;margin-bottom:0.5rem;color:#1e293b;}
        .required{color:#ef4444;margin-left:4px;}
        input,textarea{width:100%;padding:0.85rem 1rem;border:1px solid #e2e8f0;border-radius:1rem;font-size:1rem;transition:0.2s;background:#fefefe;}
        input:focus,textarea:focus{outline:none;border-color:#4f46e5;box-shadow:0 0 0 3px #4f46e533;}
        .hint{font-size:0.75rem;color:#64748b;margin-top:0.35rem;}
        button{background:#4f46e5;color:#fff;font-weight:700;font-size:1rem;padding:0.9rem;border:none;border-radius:2rem;width:100%;cursor:pointer;transition:0.2s;margin-top:0.75rem;}
        button:hover{background:#4338ca;transform:scale(0.98);}
        .toast{margin-top:1.5rem;background:#f1f5f9;border-radius:1rem;padding:1rem;text-align:center;font-size:0.85rem;color:#1e293b;display:none;}
        .footer{background:#f8fafc;padding:1rem 2rem;text-align:center;font-size:0.75rem;color:#64748b;border-top:1px solid #eef2ff;}
    </style>
</head>
<body>
<div class="card">
    <div class="card-header">
        <h1>🧠 职场黑话翻译器<br><span style="font-size:1rem;">共建词库</span></h1>
        <p>提交你遇到的黑话 + 大白话解释，审核后会被加入AI知识库</p>
    </div>
    <div class="card-body">
        <form id="submitForm">
            <div class="form-group">
                <label>🔍 职场黑话 <span class="required">*</span></label>
                <input type="text" name="slang" placeholder="例：降本增笑 / 对齐颗粒度" required>
                <div class="hint">词或短语，原汁原味</div>
            </div>
            <div class="form-group">
                <label>📖 大白话解释 <span class="required">*</span></label>
                <textarea name="definition" rows="3" placeholder="用最简单的话说明白真实意思……" required></textarea>
                <div class="hint">越直白越好，最好带点幽默</div>
            </div>
            <div class="form-group">
                <label>👤 你的昵称（选填）</label>
                <input type="text" name="submitter" placeholder="热心网友">
            </div>
            <button type="submit">🚀 提交黑话</button>
            <div id="messageBox" class="toast"></div>
        </form>
    </div>
    <div class="footer">💡 所有提交将进入“待审核”表，管理员手动审核后加入主知识库。</div>
</div>
<script>
    // ========== 请替换成你的真实值 ==========
    const WORKFLOW_ID = "7638245914289029156";   // 例如 ws_abc123
    const PAT = "pat_UaGaQmVZaIVdwlEybwAcjW2WVheYgLbE4v63e6IEYIQHTf6H5uiEsWSGB7xnRGyH";                 // 例如 pat_xxx
    // =====================================

    const form = document.getElementById('submitForm');
    const msgBox = document.getElementById('messageBox');
    const submitBtn = document.querySelector('button[type="submit"]');

    function showMessage(msg, isError = false) {
        msgBox.style.display = 'block';
        msgBox.textContent = msg;
        msgBox.style.backgroundColor = isError ? '#fee2e2' : '#dbeafe';
        msgBox.style.color = isError ? '#b91c1c' : '#1e3a8a';
        setTimeout(() => {
            msgBox.style.display = 'none';
        }, 5000);
    }

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const slang = form.slang.value.trim();
        const definition = form.definition.value.trim();
        const submitter = form.submitter.value.trim() || '热心网友';

        if (!slang || slang.length < 2) {
            showMessage('请填写黑话（至少2个字）', true);
            return;
        }
        if (!definition || definition.length < 4) {
            showMessage('请填写大白话解释（至少4个字）', true);
            return;
        }

        submitBtn.disabled = true;
        submitBtn.textContent = '提交中...';

        try {
            const response = await fetch('https://api.coze.cn/v1/workflow/run', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${PAT}`
                },
                body: JSON.stringify({
                    workflow_id: WORKFLOW_ID,
                    parameters: { slang, definition, submitter }
                })
            });
            const result = await response.json();
            if (response.ok && result.code === 0) {
                showMessage('✅ 提交成功！黑话已进入审核队列，感谢贡献～');
                form.reset();
            } else {
                console.error(result);
                showMessage(`❌ 提交失败（${result.code || response.status}），请稍后重试`, true);
            }
        } catch (err) {
            console.error(err);
            showMessage('🌐 网络开小差了，请检查网络后重试', true);
        } finally {
            submitBtn.disabled = false;
            submitBtn.textContent = '🚀 提交黑话';
        }
    });
</script>
</body>
</html>
